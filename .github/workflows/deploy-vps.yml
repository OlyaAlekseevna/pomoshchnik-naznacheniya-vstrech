name: Deploy Bot to VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for var in VPS_HOST VPS_USER VPS_PROJECT_PATH VPS_SSH_PRIVATE_KEY VPS_KNOWN_HOSTS; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          if [ -z "${VPS_PORT:-}" ]; then
            echo "VPS_PORT secret is not set. Using default port 22."
            echo "VPS_PORT=22" >> "$GITHUB_ENV"
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run deploy script on VPS
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "PROJECT_PATH='$VPS_PROJECT_PATH' DEPLOY_BRANCH='main' DEPLOY_SHA='${GITHUB_SHA}' HEALTHCHECK_URL='http://127.0.0.1:8000/health' bash -s" \
            < scripts/deploy_vps.sh
