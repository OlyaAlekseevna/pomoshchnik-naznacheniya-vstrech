services:
  caddy:
    image: caddy:2.9-alpine
    depends_on:
      app:
        condition: service_started
    env_file:
      - .env
    environment:
      MINIAPP_DOMAIN: ${MINIAPP_DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
